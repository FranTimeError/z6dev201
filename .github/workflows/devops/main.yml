 - hosts: PROD_SRV
   gather_facts: false
   vars_files:
     - ../../../users.yml

   tasks:
     - name: Create users
       ansible.builtin.user:
         name: "{{ item.username }}"
         password: "{{ item.password | password_hash('sha512') }}"
         shell: /bin/bash
         state: present
         create_home: yes
       loop: "{{ list_of_users }}"